<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Passwords - Clever Bear</title>
    <link rel="icon" type="image/png" href="miniLogo2_limpio-removebg-preview.png">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding-top: 100px; display: flex; flex-direction: column; align-items: center; }
        
        /* Menú de Navegación */
        nav { background-color: #1a1a1a; width: 100%; position: fixed; top: 0; left: 0; display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; box-sizing: border-box; border-bottom: 2px solid #b18e69; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; }
        .logo-contenedor { display: flex; align-items: center; text-decoration: none; }
        .logo-contenedor img { height: 50px; width: auto; margin-right: 12px; }
        .logo-contenedor span { font-size: 20px; font-weight: bold; color: #e6e1d5; }
        .enlaces a { color: #e6e1d5; text-decoration: none; margin-left: 20px; font-size: 14px; transition: all 0.3s; padding: 8px 12px; border-radius: 6px; }
        .enlaces a:hover { color: #ffffff; background-color: #b18e69; }
        .enlaces a.activo { color: #ffffff; background-color: #8c7052; font-weight: bold; }

        /* Estilos de la Herramienta */
        .tarjeta-herramienta { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.6); width: 100%; max-width: 420px; border-top: 5px solid #b18e69; }
        h2 { text-align: center; color: #e6e1d5; margin-top: 0; }
        
        .opciones { margin-top: 20px; }
        .opcion-fila { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 8px; background: #2a2a2a; border-radius: 6px;}
        label { font-size: 15px; color: #e6e1d5; }
        input[type="range"] { width: 100%; accent-color: #b18e69; margin-top: 10px; }
        input[type="checkbox"] { accent-color: #b18e69; width: 18px; height: 18px; }
        
        .resultado-caja { background-color: #121212; padding: 15px; border-radius: 6px; text-align: center; margin-top: 20px; border: 1px dashed #b18e69; }
        .password-generada { color: #b18e69; font-weight: bold; font-size: 22px; letter-spacing: 2px; word-break: break-all; }
        
        button { background-color: #b18e69; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.3s; width: 100%; margin-top: 15px; font-size: 16px;}
        button:hover { background-color: #8c7052; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo-contenedor">
            <img src="logo2_limpio-removebg-preview.png" alt="Clever Bear Logo">
        </a>
        <div class="enlaces">
           <a href="index.html">Calc. IVA</a>
            <a href="whatsapp.html">WhatsApp Linker</a> 
            <a href="passwords.html" class="activo">Secure Passwords</a>
        </div>
    </nav>

    <div class="tarjeta-herramienta">
        <h2>Contraseña Segura</h2>
        
        <div class="resultado-caja">
            <div class="password-generada" id="passOutput">Contraseña...</div>
        </div>
        <button id="btnCopiar">Copiar Contraseña</button>

        <div class="opciones">
            <div style="margin-bottom: 15px;">
                <label for="longitud">Longitud: <span id="longitudValor" style="color:#b18e69; font-weight:bold;">12</span></label>
                <input type="range" id="longitud" min="6" max="30" value="12">
            </div>

            <div class="opcion-fila">
                <label for="incMayus">Mayúsculas (A-Z)</label>
                <input type="checkbox" id="incMayus" checked>
            </div>
            <div class="opcion-fila">
                <label for="incMinus">Minúsculas (a-z)</label>
                <input type="checkbox" id="incMinus" checked>
            </div>
            <div class="opcion-fila">
                <label for="incNum">Números (0-9)</label>
                <input type="checkbox" id="incNum" checked>
            </div>
            <div class="opcion-fila">
                <label for="incSimbolos">Símbolos (@#$%)</label>
                <input type="checkbox" id="incSimbolos" checked>
            </div>
        </div>
        
        <button id="btnGenerar" style="background-color: #333;">Generar Nueva</button>
    </div>

    <script>
        // Caracteres disponibles
        const mayusculas = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const minusculas = "abcdefghijklmnopqrstuvwxyz";
        const numeros = "0123456789";
        const simbolos = "!@#$%^&*()_+~|}{[]:;?><,./-=";

        // Elementos del HTML
        const sliderLongitud = document.getElementById('longitud');
        const txtLongitud = document.getElementById('longitudValor');
        const chkMayus = document.getElementById('incMayus');
        const chkMinus = document.getElementById('incMinus');
        const chkNum = document.getElementById('incNum');
        const chkSimb = document.getElementById('incSimbolos');
        const passOutput = document.getElementById('passOutput');
        const btnGenerar = document.getElementById('btnGenerar');
        const btnCopiar = document.getElementById('btnCopiar');

        // Actualizar el numerito de la longitud al mover la barra
        sliderLongitud.addEventListener('input', () => {
            txtLongitud.innerText = sliderLongitud.value;
            generarPassword(); // Genera al vuelo al mover la barra
        });

        // Función principal
        function generarPassword() {
            let caracteresDisponibles = "";
            let passwordFinal = "";

            if (chkMayus.checked) caracteresDisponibles += mayusculas;
            if (chkMinus.checked) caracteresDisponibles += minusculas;
            if (chkNum.checked) caracteresDisponibles += numeros;
            if (chkSimb.checked) caracteresDisponibles += simbolos;

            // Si el usuario desmarca todo, evitamos un error
            if (caracteresDisponibles === "") {
                passOutput.innerText = "Selecciona una opción";
                return;
            }

            let longitudDeseada = sliderLongitud.value;

            // Bucle for: coge un carácter al azar hasta llegar a la longitud
            for (let i = 0; i < longitudDeseada; i++) {
                let numeroAzar = Math.floor(Math.random() * caracteresDisponibles.length);
                passwordFinal += caracteresDisponibles.substring(numeroAzar, numeroAzar + 1);
            }

            passOutput.innerText = passwordFinal;
        }

        // Generar al hacer clic en opciones
        chkMayus.addEventListener('change', generarPassword);
        chkMinus.addEventListener('change', generarPassword);
        chkNum.addEventListener('change', generarPassword);
        chkSimb.addEventListener('change', generarPassword);
        btnGenerar.addEventListener('click', generarPassword);

        // Generar la primera contraseña nada más abrir la web
        generarPassword();

        // Copiar al portapapeles
        btnCopiar.addEventListener('click', () => {
            if(passOutput.innerText === "Selecciona una opción") return;
            navigator.clipboard.writeText(passOutput.innerText);
            btnCopiar.innerText = "¡Copiada!";
            btnCopiar.style.backgroundColor = "#4CAF50";
            
            setTimeout(() => {
                btnCopiar.innerText = "Copiar Contraseña";
                btnCopiar.style.backgroundColor = "#b18e69";
            }, 2000);
        });
    </script>
</body>
</html>
